services:
  mysql:
    image: mysql:8.0
    container_name: paouvir-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: paouvir
      MYSQL_USER: paouvir
      MYSQL_PASSWORD: paouvir
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: